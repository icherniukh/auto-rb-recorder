name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build_release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install pyinstaller

      - name: Install Certificates
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PWD }}

      - name: Build Executable
        run: |
          source .venv/bin/activate
          bash scripts/build.sh

      - name: Code Sign Binary
        run: |
          # The --timestamp flag is strictly required for Notarization
          # The --options runtime enables the Hardened Runtime, also required
          xcrun codesign --force --options runtime --timestamp --deep --sign "Developer ID Application" dist/auto-rb-recorder

      - name: Package Release
        run: |
          mkdir -p release_package
          cp dist/auto-rb-recorder release_package/
          cp config.default.toml release_package/
          cd release_package
          # Apple Notary tool heavily prefers structural zips over tar.gz payloads
          zip -r ../auto-rb-recorder-macos-universal.zip *

      - name: Notarize Release
        env:
          NOTARIZATION_KEY_P8: ${{ secrets.NOTARIZATION_KEY_P8 }}
          NOTARIZATION_KEY_ID: ${{ secrets.NOTARIZATION_KEY_ID }}
          NOTARIZATION_ISSUER_ID: ${{ secrets.NOTARIZATION_ISSUER_ID }}
        run: |
          # Save the P8 key to a temporary file
          AUTH_KEY_PATH=$RUNNER_TEMP/AuthKey_${NOTARIZATION_KEY_ID}.p8
          echo "$NOTARIZATION_KEY_P8" > $AUTH_KEY_PATH
          
          xcrun notarytool submit auto-rb-recorder-macos-universal.zip \
            --key "$AUTH_KEY_PATH" \
            --key-id "$NOTARIZATION_KEY_ID" \
            --issuer "$NOTARIZATION_ISSUER_ID" \
            --wait

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: auto-rb-recorder-macos-universal.zip
          generate_release_notes: true
