name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build_release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install pyinstaller

      - name: Install Certificates
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PWD }}

      - name: Build Executable
        run: |
          source .venv/bin/activate
          bash scripts/build.sh

      - name: Code Sign Binary
        run: |
          # --options runtime: Hardened Runtime (required for notarization)
          # --timestamp: required for notarization
          # --entitlements: disable-library-validation allows PyInstaller's bundled
          #   Python.framework (signed by PSF, different Team ID) to load at runtime
          # Note: --deep is intentionally omitted — it is for .app bundles, not
          #   --onefile binaries, and causes signing issues here
          xcrun codesign --force --options runtime --timestamp \
            --entitlements entitlements.plist \
            --sign "Developer ID Application" dist/auto-rb-recorder

      - name: Package Release
        run: |
          mkdir -p release_package
          cp dist/auto-rb-recorder release_package/
          cp config.default.toml release_package/
          cd release_package
          # Apple Notary tool heavily prefers structural zips over tar.gz payloads
          zip -r ../auto-rb-recorder-macos-universal.zip *

      - name: Notarize Release
        env:
          NOTARIZATION_KEY_P8: ${{ secrets.NOTARIZATION_KEY_P8 }}
          NOTARIZATION_KEY_ID: ${{ secrets.NOTARIZATION_KEY_ID }}
          NOTARIZATION_ISSUER_ID: ${{ secrets.NOTARIZATION_ISSUER_ID }}
        run: |
          # Save the P8 key to a temporary file
          AUTH_KEY_PATH=$RUNNER_TEMP/AuthKey_${NOTARIZATION_KEY_ID}.p8
          echo "$NOTARIZATION_KEY_P8" > $AUTH_KEY_PATH

          xcrun notarytool submit auto-rb-recorder-macos-universal.zip \
            --key "$AUTH_KEY_PATH" \
            --key-id "$NOTARIZATION_KEY_ID" \
            --issuer "$NOTARIZATION_ISSUER_ID" \
            --wait

      - name: Upload Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: auto-rb-recorder-macos-universal.zip
          generate_release_notes: true

      - name: Update Homebrew Tap
        uses: mislav/bump-homebrew-formula-action@v4.1
        with:
          formula-name: auto-rb-recorder
          homebrew-tap: icherniukh/homebrew-tap
          base-branch: main
          download-url: https://github.com/icherniukh/auto-rb-recorder/releases/download/${{ github.ref_name }}/auto-rb-recorder-macos-universal.zip
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
